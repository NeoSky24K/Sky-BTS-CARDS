<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOSKY BTS CARDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bts-purple: #8A2BE2;
            --bts-light-purple: #DDA0DD;
            --bts-dark: #0a0512;
            --bts-dark-panel: rgba(20, 10, 30, 0.95);
            --bts-pink: #FF69B4;
            --gold: #ffd700;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bts-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }

        /* === PANTALLAS DE ACCESO === */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bts-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: var(--bts-dark-panel); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--bts-purple); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(138, 43, 226, 0.2); }
        .auth-inputs input, .auth-inputs textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--bts-purple); background: rgba(0,0,0,0.4); color: white; outline: none; }
        
        .btn-primary { background: linear-gradient(45deg, var(--bts-purple), var(--bts-pink)); color: white; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; border: none; transition: var(--transition); margin-bottom: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--bts-purple); color: white; padding: 10px; border-radius: 25px; width: 100%; cursor: pointer; transition: var(--transition); }

        /* === HEADER Y NAV === */
        header { display: none; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--bts-purple); sticky: top; z-index: 100; }
        .user-widget { display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative; }
        .user-widget img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--bts-purple); object-fit: cover; }
        
        nav { display: none; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        .nav-btn { background: rgba(138, 43, 226, 0.1); border: 1px solid var(--bts-purple); color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: var(--transition); }
        .nav-btn.active { background: var(--bts-purple); box-shadow: 0 0 15px var(--bts-purple); }

        /* === CONTENIDO === */
        main { display: none; padding: 20px 5%; max-width: 1200px; margin: 0 auto; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .empty-msg { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted); border: 1px dashed var(--bts-purple); border-radius: 15px; }

        /* === MOSTRADOR DE PERFIL === */
        .showcase-container { margin-top: 20px; }
        .showcase-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .slot { width: 70px; height: 100px; border: 1px dashed var(--bts-purple); border-radius: 8px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        /* === MODALES === */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bts-dark-panel); padding: 30px; border-radius: 20px; border: 1px solid var(--bts-purple); width: 90%; max-width: 500px; position: relative; text-align: center; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }

        .friend-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.3s; }
        .friend-item:hover { border-color: var(--bts-purple); }
    </style>
</head>
<body>

    <div id="loader" class="auth-overlay">
        <h1 style="color: var(--bts-purple); letter-spacing: 8px; animation: pulse 1.5s infinite;">BORAHAE</h1>
    </div>

    <div id="auth-container" class="auth-overlay" style="display:none;">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">💜 NeoSky Cards</h2>
            <div class="auth-inputs">
                <input type="email" id="email-field" placeholder="Correo electrónico">
                <input type="password" id="pass-field" placeholder="Contraseña">
            </div>
            <button class="btn-primary" onclick="handleAuth('login')">Entrar</button>
            <button class="btn-outline" onclick="handleAuth('register')">Crear Cuenta</button>
        </div>
    </div>

    <div id="setup-container" class="auth-overlay" style="display:none;">
        <div class="auth-card">
            <h3>Configura tu Perfil</h3>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Dinos quién eres para empezar</p>
            <div class="auth-inputs">
                <input type="text" id="setup-user" placeholder="Nombre de usuario">
                <input type="text" id="setup-tastes" placeholder="Tus Bias/Gustos">
                <textarea id="setup-bio" placeholder="Tu descripción..."></textarea>
            </div>
            <button class="btn-primary" onclick="finishSetup()">Completar Registro</button>
        </div>
    </div>

    <header id="main-header">
        <div class="music-player">
            <button class="btn-outline" style="width: auto; padding: 5px 15px;" onclick="togglePlay()">🎵</button>
        </div>
        <div class="user-widget" onclick="toggleDropdown()">
            <span id="display-name">Usuario</span>
            <img id="display-pfp" src="https://i.pinimg.com/1200x/24/67/91/246791aeaf784b5d3443776148988488.jpg">
            <div id="dropdown" style="display:none; position:absolute; top:55px; right:0; background: var(--bts-dark-panel); border:1px solid var(--bts-purple); padding:10px; border-radius:10px; width:180px;">
                <p onclick="openModal('profile-modal')" style="padding:10px; cursor:pointer;">Ver Perfil</p>
                <p onclick="logout()" style="padding:10px; cursor:pointer; color:var(--bts-pink);">Cerrar Sesión</p>
            </div>
        </div>
    </header>

    <nav id="main-nav">
        <button class="nav-btn active" onclick="showTab('collection', this)">Colección</button>
        <button class="nav-btn" onclick="showTab('roulette', this)">Ruleta</button>
        <button class="nav-btn" onclick="showTab('friends', this)">Amigos</button>
        <button class="nav-btn" onclick="showTab('codes', this)">Códigos</button>
    </nav>

    <main>
        <section id="collection" class="tab-content active">
            <h2>Mi Colección</h2>
            <div class="card-grid" id="inventory">
                <div class="empty-msg">No tienes tarjetas aún.</div>
            </div>
        </section>

        <section id="friends" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Amigos</h2>
                <button class="btn-outline" style="width:auto;" onclick="openModal('add-friend-modal')">+ Añadir</button>
            </div>
            <div id="friend-list" style="margin-top:20px;">
                <div class="empty-msg">Tu lista está vacía.</div>
            </div>
        </section>

        <section id="roulette" class="tab-content">
            <div style="text-align:center;">
                <h2>Ruleta Mágica</h2>
                <div id="wheel" style="width:250px; height:250px; border-radius:50%; border:5px solid var(--bts-purple); margin:30px auto; background: conic-gradient(var(--bts-purple) 0deg 180deg, var(--bts-dark) 180deg 360deg);"></div>
                <button class="btn-primary" style="max-width:200px;" onclick="spin()">Girar Ruleta</button>
            </div>
        </section>
    </main>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="profile-img" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--bts-purple);">
            <h2 id="profile-name">Nombre</h2>
            <p id="profile-bio" style="color:var(--text-muted); margin:10px 0;"></p>
            
            <div class="showcase-container">
                <h4>Mostrador de Tarjetas</h4>
                <div class="showcase-grid" id="profile-showcase">
                    <div class="slot">1</div><div class="slot">2</div><div class="slot">3</div><div class="slot">4</div><div class="slot">5</div>
                </div>
            </div>
        </div>
    </div>

    <div id="add-friend-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Buscar Amigo</h3>
            <input type="text" id="search-friend-input" placeholder="Nombre de usuario..." style="width:100%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid var(--bts-purple); background:transparent; color:white;">
            <button class="btn-primary" onclick="addFriend()">Enviar Solicitud</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEHxoobhrHfE7AKJr3mWUomWzIy8ePpeo",
            authDomain: "sky-bts-cards.firebaseapp.com",
            projectId: "sky-bts-cards",
            storageBucket: "sky-bts-cards.firebasestorage.app",
            messagingSenderId: "370282588968",
            appId: "1:370282588968:web:2502fdd9c6a85b8b183e1d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTENTICACIÓN ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            if (!email || !pass) return alert("Completa los campos");

            try {
                if (type === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Error: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    loadAppData(userDoc.data());
                } else {
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('setup-container').style.display = 'flex';
                }
            } else {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('main-header').style.display = 'none';
                document.querySelector('main').style.display = 'none';
                document.getElementById('main-nav').style.display = 'none';
            }
            document.getElementById('loader').style.display = 'none';
        });

        window.finishSetup = async () => {
            const user = auth.currentUser;
            const username = document.getElementById('setup-user').value;
            if (!username) return alert("El nombre es obligatorio");

            const data = {
                username,
                bio: document.getElementById('setup-bio').value,
                tastes: document.getElementById('setup-tastes').value,
                inventory: [],
                friends: [],
                showcase: [null, null, null, null, null],
                pfp: "https://i.pinimg.com/1200x/24/67/91/246791aeaf784b5d3443776148988488.jpg"
            };

            await setDoc(doc(db, "users", user.uid), data);
            location.reload();
        };

        function loadAppData(data) {
            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-nav').style.display = 'flex';
            document.querySelector('main').style.display = 'block';
            document.getElementById('display-name').innerText = data.username;
        }

        window.logout = () => signOut(auth);

        // --- UI LOGIC ---
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.toggleDropdown = () => {
            const d = document.getElementById('dropdown');
            d.style.display = d.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
